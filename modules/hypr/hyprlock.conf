$color = rgba(0.168, 0.168, 0.168, 1.0)
$inner_color = rgba(0.168, 0.168, 0.168, 1.0)
$outer_color = rgba(0.66, 0.718, 0.776, 1.0)
$font_color = rgba(0.66, 0.718, 0.776, 1.0)
$check_color = rgba(0.737, 0.247, 0.235, 1.0)

general {
    ignore_empty_input = true
}

background {
    monitor =
    color = $color
    path = ~/.local/share/wallpapers/rotation/unsplash-vincentu-solomon.jpg
}

animations {
    enabled = true
}

input-field {
    monitor =
    size = 650, 100
    position = 0, 0
    halign = center
    valign = center

    inner_color = $inner_color
    outer_color = $outer_color
    outline_thickness = 4

    font_family = JetBrainsMono Nerd Font
    font_color = $font_color

    placeholder_text = Enter Password
    check_color = $check_color
    fail_text = <i>$FAIL ($ATTEMPTS)</i>

    rounding = 0
    shadow_passes = 0
    fade_on_empty = false
}

auth {
    pam:module = hyprlock
    fingerprint:enabled = false
}
